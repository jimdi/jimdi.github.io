<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <title>Случайная статья</title>
  <style>
    :root {
      --bg: #fff; --bg-card: #f6f8fa; --text: #24292e; --text-secondary: #656d76;
      --link: #0366d6; --primary: #2ea44f; --primary-hover: #2c974b;
      --error: #cf222e; --border: #d0d7de; --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117; --bg-card: #161b22; --text: #e6edf3; --text-secondary: #8b949e;
        --link: #58a6ff; --primary: #238636; --primary-hover: #2ea043;
        --error: #f85149; --border: #30363d; --shadow: 0 1px 3px rgba(0,0,0,.3);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(1rem, 5vw, 3rem) clamp(1rem, 4vw, 2rem);
      padding-top: max(env(safe-area-inset-top, 0px), clamp(1rem, 5vw, 3rem));
      padding-bottom: max(env(safe-area-inset-bottom, 0px), clamp(1rem, 5vw, 3rem));
      text-align: center;
    }
    .wrap { width: 100%; max-width: 640px; display: flex; flex-direction: column; min-height: 80dvh; }
    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 700;
      margin-bottom: clamp(.75rem, 3vw, 1.5rem); flex-shrink: 0;
    }
    #title {
      position: relative;
      display: flex; align-items: center; justify-content: center; gap: .5em;
      font-size: clamp(1.1rem, 4vw, 1.6rem); font-weight: 600;
      min-height: 4em; word-break: break-word;
      line-height: 1.3; flex-shrink: 0; margin-bottom: .5em;
      padding: 0 clamp(4.5rem, 12vw, 6rem);
    }
    #flag { font-size: 1.2em; flex-shrink: 0; line-height: 1; }
    #flag:empty { display: none; }
    .nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 700;
      color: var(--text); opacity: .5; transition: opacity .15s;
      flex-shrink: 0; padding: 0 .1em; line-height: 1;
      min-width: 48px; min-height: 48px;
      display: inline-flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    #prev-first { left: 0; }
    #prev { left: 3rem; }
    #next-nav { right: 3rem; }
    #next-last { right: 0; }
    .nav-btn:hover:not(:disabled) { opacity: 1; }
    .nav-btn:disabled { opacity: .15; cursor: default; }
    #url {
      display: block; color: var(--link);
      font-size: clamp(.8rem, 2.5vw, 1rem);
      margin: 0 auto clamp(.75rem, 3vw, 1.25rem);
      max-width: 100%; word-break: break-all; text-decoration: none;
      opacity: .85; transition: opacity .15s; flex-shrink: 0;
    }
    #url:hover, #url:focus { opacity: 1; text-decoration: underline; }
    #next {
      display: inline-flex; align-items: center; justify-content: center;
      padding: clamp(.65rem, 2vw, .85rem) clamp(1.2rem, 4vw, 2rem);
      font-size: clamp(.95rem, 2.5vw, 1.05rem); font-weight: 600;
      min-height: 48px; min-width: 48px;
      cursor: pointer; border: none; background: var(--primary); color: #fff;
      border-radius: 12px; transition: background .2s, transform .1s;
      user-select: none; -webkit-user-select: none; flex-shrink: 0;
    }
    #next:hover { background: var(--primary-hover); }
    #next:active { transform: scale(.97); }
    #next:disabled { opacity: .5; cursor: wait; transform: none; }
    #counter {
      margin-top: clamp(.5rem, 2vw, .75rem);
      font-size: clamp(.7rem, 2vw, .8rem); color: var(--text-secondary);
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }
    #error {
      color: var(--error); margin-top: clamp(.5rem, 2vw, 1rem);
      font-size: clamp(.8rem, 2.5vw, .9rem);
    }
    footer {
      margin-top: clamp(1.5rem, 5vw, 2.5rem);
      font-size: clamp(.7rem, 2vw, .8rem); color: var(--text-secondary);
      flex-shrink: 0;
    }
    footer a { color: var(--link); }
    @media (min-width: 768px) {
      .wrap { padding: 0 1rem; }
    }
    @media (hover: none) and (pointer: coarse) {
      #next { min-height: 52px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎲 Случайная статья</h1>
    <div id="title">
      <button id="prev-first" class="nav-btn" disabled title="Первая просмотренная">&lt;&lt;</button>
      <button id="prev" class="nav-btn" disabled title="Предыдущая">&lt;</button>
      <span id="flag"></span>
      <span id="title-text">Загрузка...</span>
      <button id="next-nav" class="nav-btn" disabled title="Следующая">&gt;</button>
      <button id="next-last" class="nav-btn" disabled title="Последняя просмотренная">&gt;&gt;</button>
    </div>
    <a id="url" href="#" target="_blank" rel="noopener"></a>
    <button id="next">Ещё одну</button>
    <div id="counter"></div>
    <div id="error"></div>
    <footer>по мотивам <a href="https://idiod.leprosorium.ru/comments/2106762/" target="_blank" rel="noopener">псто</a></footer>
  </div>

  <script>
    const GZ_URL = 'wiki_links.json.gz?v=5';
    const JS_URL = 'wiki_links_data.js?v=5';
    const STORAGE_KEY = 'wiki_seen';
    const HISTORY_KEY = 'wiki_history';
    const HISTORY_INDEX_KEY = 'wiki_history_index';

    const LANG_FLAGS = {
      en:'🇬🇧',ru:'🇷🇺',de:'🇩🇪',fr:'🇫🇷',es:'🇪🇸',it:'🇮🇹',pt:'🇵🇹',
      pl:'🇵🇱',nl:'🇳🇱',sv:'🇸🇪',uk:'🇺🇦',be:'🇧🇾',cs:'🇨🇿',da:'🇩🇰',
      fi:'🇫🇮',el:'🇬🇷',he:'🇮🇱',hu:'🇭🇺',id:'🇮🇩',ja:'🇯🇵',ko:'🇰🇷',
      lt:'🇱🇹',lv:'🇱🇻',nb:'🇳🇴',nn:'🇳🇴',ro:'🇷🇴',sk:'🇸🇰',sl:'🇸🇮',
      sr:'🇷🇸',th:'🇹🇭',vi:'🇻🇳',bg:'🇧🇬',tr:'🇹🇷',ar:'🇸🇦',zh:'🇨🇳',
      hi:'🇮🇳',simple:'🇬🇧',sh:'🇷🇸',et:'🇪🇪',ms:'🇲🇾',tl:'🇵🇭',
    };

    function getFlag(url) {
      try {
        const lang = new URL(url).hostname.split('.')[0];
        return LANG_FLAGS[lang] || '';
      } catch { return ''; }
    }
    let items = [];
    let seen = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    let historyIndex = parseInt(localStorage.getItem(HISTORY_INDEX_KEY) || '-1', 10);

    function saveHistory() {
      try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        localStorage.setItem(HISTORY_INDEX_KEY, String(historyIndex));
      } catch {}
    }

    const titleEl = document.getElementById('title-text');
    const flagEl = document.getElementById('flag');
    const urlEl = document.getElementById('url');
    const errorEl = document.getElementById('error');
    const counterEl = document.getElementById('counter');
    const btnNext = document.getElementById('next');
    const btnPrevFirst = document.getElementById('prev-first');
    const btnPrev = document.getElementById('prev');
    const btnNextNav = document.getElementById('next-nav');
    const btnNextLast = document.getElementById('next-last');

    function saveSeen() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...seen])); } catch {}
    }

    function safeDecode(url) {
      try {
        const u = new URL(url);
        return u.origin + decodeURIComponent(u.pathname) + decodeURIComponent(u.search) + u.hash;
      } catch { return url; }
    }

    async function loadGzipped(url) {
      const res = await fetch(url, { cache: 'force-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const ds = new DecompressionStream('gzip');
      const decompressed = res.body.pipeThrough(ds);
      return new Response(decompressed).text();
    }

    function loadViaScript(url) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = url;
        s.onload = () => {
          if (window.WIKI_LINKS) {
            resolve(JSON.stringify(window.WIKI_LINKS));
            delete window.WIKI_LINKS;
          } else { reject(new Error('No data')); }
        };
        s.onerror = () => reject(new Error('Script load failed'));
        document.head.appendChild(s);
      });
    }

    async function loadItems() {
      try {
        const text = await loadGzipped(GZ_URL);
        return JSON.parse(text);
      } catch {
        const text = await loadViaScript(JS_URL);
        return JSON.parse(text);
      }
    }

    function pickItem() {
      const unseen = items.filter((_, i) => !seen.has(i));
      if (!unseen.length) {
        seen.clear();
        return items[Math.floor(Math.random() * items.length)];
      }
      return unseen[Math.floor(Math.random() * unseen.length)];
    }

    function showItem(item, isNav) {
      titleEl.textContent = item.title;
      flagEl.textContent = getFlag(item.url);
      urlEl.href = item.url;
      urlEl.textContent = safeDecode(item.url);
      seen = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
      counterEl.textContent = isNav
        ? `${seen.size} / ${items.length} · ${historyIndex + 1} / ${history.length}`
        : `${seen.size} / ${items.length}`;
      btnPrevFirst.disabled = historyIndex <= 0;
      btnPrev.disabled = historyIndex <= 0;
      btnNextNav.disabled = historyIndex >= history.length - 1;
      btnNextLast.disabled = historyIndex >= history.length - 1;
    }

    async function load() {
      errorEl.textContent = '';
      btnNext.disabled = true;

      try {
        if (!items.length) { items = await loadItems(); }
        if (!items.length) throw new Error('Пустой список');

        if (historyIndex < history.length - 1) {
          history = history.slice(0, historyIndex + 1);
        }

        const item = pickItem();
        const idx = items.indexOf(item);
        seen.add(idx);
        saveSeen();

        historyIndex++;
        history[historyIndex] = idx;
        history.length = historyIndex + 1;
        saveHistory();

        showItem(item);
      } catch (e) {
        errorEl.textContent = 'Ошибка: ' + e.message;
        titleEl.textContent = '—';
        flagEl.textContent = '';
        urlEl.href = '#';
        urlEl.textContent = '';
        counterEl.textContent = '';
      } finally {
        btnNext.disabled = false;
      }
    }

    function goFirst() {
      if (historyIndex <= 0) return;
      historyIndex = 0;
      showItem(items[history[historyIndex]], true);
      saveHistory();
    }

    function goPrev() {
      if (historyIndex <= 0) return;
      historyIndex--;
      showItem(items[history[historyIndex]], true);
      saveHistory();
    }

    function goNextNav() {
      if (historyIndex >= history.length - 1) return;
      historyIndex++;
      showItem(items[history[historyIndex]], true);
      saveHistory();
    }

    function goLast() {
      if (historyIndex >= history.length - 1) return;
      historyIndex = history.length - 1;
      showItem(items[history[historyIndex]], true);
      saveHistory();
    }

    btnPrevFirst.addEventListener('click', goFirst);
    btnPrev.addEventListener('click', goPrev);
    btnNextNav.addEventListener('click', goNextNav);
    btnNextLast.addEventListener('click', goLast);
    btnNext.addEventListener('click', load);

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        if (!items.length) items = await loadItems();
        if (!items.length) throw new Error('Пустой список');

        if (history.length > 0 && historyIndex >= 0 && historyIndex < history.length && history[historyIndex] < items.length) {
          showItem(items[history[historyIndex]]);
        } else {
          history = [];
          historyIndex = -1;
          saveHistory();
          await load();
        }
      } catch (e) {
        errorEl.textContent = 'Ошибка: ' + e.message;
        titleEl.textContent = '—';
        flagEl.textContent = '';
        urlEl.href = '#';
        urlEl.textContent = '';
        counterEl.textContent = '';
      } finally {
        btnNext.disabled = false;
      }
    });
  </script>
</body>
</html>
