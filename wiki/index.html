<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <title>Random article</title>
  <style>
    :root {
      --bg: #fff; --bg-card: #f6f8fa; --text: #24292e; --text-secondary: #656d76;
      --link: #0366d6; --primary: #2ea44f; --primary-hover: #2c974b;
      --error: #cf222e; --border: #d0d7de; --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117; --bg-card: #161b22; --text: #e6edf3; --text-secondary: #8b949e;
        --link: #58a6ff; --primary: #238636; --primary-hover: #2ea043;
        --error: #f85149; --border: #30363d; --shadow: 0 1px 3px rgba(0,0,0,.3);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center;
      padding: clamp(1rem, 5vw, 3rem) clamp(1rem, 4vw, 2rem);
      padding-top: max(env(safe-area-inset-top, 0px), clamp(1rem, 5vw, 3rem));
      padding-bottom: max(env(safe-area-inset-bottom, 0px), clamp(1rem, 5vw, 3rem));
      text-align: center;
    }
    .wrap { width: 100%; max-width: 640px; display: flex; flex-direction: column; flex: 1; overflow-y: auto; scrollbar-gutter: stable; }
    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 700;
      margin-bottom: clamp(.75rem, 3vw, 1.5rem); flex-shrink: 0;
    }
    #title {
      position: relative;
      display: flex; align-items: center; justify-content: center; gap: .5em;
      font-size: clamp(1.1rem, 4vw, 1.6rem); font-weight: 600;
      min-height: 4em; word-break: break-word;
      line-height: 1.3; flex-shrink: 0; margin-bottom: .5em;
      padding: 0 clamp(4.5rem, 12vw, 6rem);
    }
    #flag { font-size: 1.2em; flex-shrink: 0; line-height: 1; }
    #flag:empty { display: none; }
    .nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 700;
      color: var(--text); opacity: .5; transition: opacity .15s;
      flex-shrink: 0; padding: 0 .1em; line-height: 1;
      min-width: 48px; min-height: 48px;
      display: inline-flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    #prev-first { left: 0; }
    #prev { left: 3rem; }
    #next-nav { right: 3rem; }
    #next-last { right: 0; }
    .nav-btn:hover:not(:disabled) { opacity: 1; }
    .nav-btn:disabled { opacity: .15; cursor: default; }
    #url {
      display: block; color: var(--link);
      font-size: clamp(.8rem, 2.5vw, 1rem);
      margin: 0 auto clamp(.75rem, 3vw, 1.25rem);
      max-width: 100%; word-break: break-all; text-decoration: none;
      opacity: .85; transition: opacity .15s; flex-shrink: 0;
    }
    #url:hover, #url:focus { opacity: 1; text-decoration: underline; }
    #next {
      display: inline-flex; align-items: center; justify-content: center;
      padding: clamp(.65rem, 2vw, .85rem) clamp(1.2rem, 4vw, 2rem);
      margin-top: 1.25rem;
      font-size: clamp(.95rem, 2.5vw, 1.05rem); font-weight: 600;
      min-height: 48px; min-width: 48px;
      cursor: pointer; border: none; background: var(--primary); color: #fff;
      border-radius: 12px; transition: background .2s, transform .1s;
      user-select: none; -webkit-user-select: none; flex-shrink: 0;
    }
    #next:hover { background: var(--primary-hover); }
    #next:active { transform: scale(.97); }
    #next:disabled { opacity: .5; cursor: wait; transform: none; }
    #counter {
      margin-top: clamp(.5rem, 2vw, .75rem);
      font-size: clamp(.7rem, 2vw, .8rem); color: var(--text-secondary);
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }
    #error {
      color: var(--error); margin-top: clamp(.5rem, 2vw, 1rem);
      font-size: clamp(.8rem, 2.5vw, .9rem);
    }
    footer {
      margin-top: clamp(1.5rem, 5vw, 2.5rem);
      font-size: clamp(.7rem, 2vw, .8rem); color: var(--text-secondary);
      flex-shrink: 0;
    }
    footer a { color: var(--link); }
    @media (min-width: 768px) {
      .wrap { padding: 0 1rem; }
    }
    @media (hover: none) and (pointer: coarse) {
      #next { min-height: 52px; }
      #keys-text { display: none; }
    }
    #keys-text {
      display: block; margin-top: .25rem;
      font-size: clamp(.65rem, 2vw, .75rem); opacity: .5;
    }
    .skip-link {
      position: absolute; top: .5rem; left: .5rem; z-index: 999;
      padding: .5rem 1rem; background: var(--primary); color: #fff;
      border-radius: 8px; font-size: .9rem; text-decoration: none;
      transform: translateY(-200%); transition: transform .15s;
    }
    .skip-link:focus { transform: translateY(0); }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
    :focus-visible {
      outline: 3px solid var(--link); outline-offset: 2px;
      border-radius: 4px;
    }
    #lang-btn {
      position: fixed; top: max(env(safe-area-inset-top, 0px), .5rem); right: max(env(safe-area-inset-right, 0px), .5rem);
      z-index: 1000; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; cursor: pointer; border-radius: 50%;
      background: var(--bg-card); border: 1px solid var(--border);
      box-shadow: var(--shadow); user-select: none;
      transition: background .15s;
    }
    #lang-btn:hover { background: var(--border); }
    #lang-menu {
      position: fixed; z-index: 1001;
      top: max(env(safe-area-inset-top, 0px), 3.2rem); right: max(env(safe-area-inset-right, 0px), .5rem);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 4px 12px rgba(0,0,0,.15);
      padding: .3rem; display: none; flex-direction: column; gap: 2px;
      min-width: 150px;
    }
    #lang-menu.open { display: flex; }
    #lang-menu button {
      background: none; border: none; cursor: pointer;
      padding: .45rem .75rem; border-radius: 6px;
      font-size: .85rem; color: var(--text); text-align: left;
      display: flex; align-items: center; gap: .4rem;
      white-space: nowrap;
    }
    #lang-menu button:hover { background: var(--border); }
    #lang-menu button.active { background: var(--primary); color: #fff; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0s !important;
        animation-duration: 0s !important;
      }
    }
    @media (prefers-contrast: more) {
      .nav-btn { opacity: .8; }
      .nav-btn:disabled { opacity: .3; }
      #url { opacity: 1; }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link"><span id="skip-text">Skip to content</span></a>
  <div id="lang-btn" role="button" tabindex="0" aria-label="Language">🌐</div>
  <div id="lang-menu" role="menu">
    <button role="menuitem" data-lang="auto">🌐 Auto</button>
    <button role="menuitem" data-lang="en">🇬🇧 English</button>
    <button role="menuitem" data-lang="ru">🇷🇺 Русский</button>
    <button role="menuitem" data-lang="uk">🇺🇦 Українська</button>
    <button role="menuitem" data-lang="zh">🇨🇳 中文</button>
  </div>
  <main class="wrap" id="main" tabindex="-1">
    <h1><span aria-hidden="true">🎲</span> <span id="heading-text">Random article</span></h1>
    <div id="title">
      <button id="prev-first" class="nav-btn" disabled title="First viewed" aria-label="First viewed">&lt;&lt;</button>
      <button id="prev" class="nav-btn" disabled title="Previous" aria-label="Previous">&lt;</button>
      <span id="flag"></span>
      <span id="title-text" role="heading" aria-level="2">Loading...</span>
      <button id="next-nav" class="nav-btn" disabled title="Next" aria-label="Next">&gt;</button>
      <button id="next-last" class="nav-btn" disabled title="Last viewed" aria-label="Last viewed">&gt;&gt;</button>
    </div>
    <a id="url" href="#" target="_blank" rel="noopener"></a>
    <button id="next" aria-label="Next random article">Another one</button>
    <div id="counter"></div>
    <div id="error" role="alert"></div>
    <footer>
      <span id="footer-text">based on </span><a href="https://idiod.leprosorium.ru/comments/2106762/" target="_blank" rel="noopener" id="footer-link">post</a>
      <span id="keys-text">← → · Home End history · Space / Enter new</span>
    </footer>
    <div id="announce" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script>
    const LANG_KEY = 'wiki_lang';
    const LANGUAGES = {
      en: {
        title: 'Random article',
        skip: 'Skip to content',
        heading: 'Random article',
        prevFirst: 'First viewed',
        prev: 'Previous',
        nextNav: 'Next',
        nextLast: 'Last viewed',
        nextBtn: 'Another one',
        nextBtnAria: 'Next random article',
        footer: 'based on ',
        footerLink: 'post',
        keys: '\u2190 \u2192 \u00b7 Home End history \u00b7 Space / Enter new',
        error: 'Error',
        empty: 'Empty list',
        loading: 'Loading...',
      },
      ru: {
        title: 'Случайная статья',
        skip: 'К содержанию',
        heading: 'Случайная статья',
        prevFirst: 'Первая просмотренная',
        prev: 'Предыдущая',
        nextNav: 'Следующая',
        nextLast: 'Последняя просмотренная',
        nextBtn: 'Ещё одну',
        nextBtnAria: 'Следующая случайная статья',
        footer: 'по мотивам ',
        footerLink: 'псто',
        keys: '← → · Home End по истории · Пробел / Enter новая',
        error: 'Ошибка',
        empty: 'Пустой список',
        loading: 'Загрузка...',
      },
      uk: {
        title: 'Випадкова стаття',
        skip: 'До змісту',
        heading: 'Випадкова стаття',
        prevFirst: 'Перша переглянута',
        prev: 'Попередня',
        nextNav: 'Наступна',
        nextLast: 'Остання переглянута',
        nextBtn: 'Ще одну',
        nextBtnAria: 'Наступна випадкова стаття',
        footer: 'за мотивами ',
        footerLink: 'посту',
        keys: '← → · Home End історія · Пробіл / Enter нова',
        error: 'Помилка',
        empty: 'Порожній список',
        loading: 'Завантаження...',
      },
      zh: {
        title: '随机文章',
        skip: '跳转到内容',
        heading: '随机文章',
        prevFirst: '第一个浏览的',
        prev: '上一个',
        nextNav: '下一个',
        nextLast: '最后一个浏览的',
        nextBtn: '再来一个',
        nextBtnAria: '下一篇随机文章',
        footer: '基于 ',
        footerLink: '帖子',
        keys: '← → · Home End 历史 · 空格 / Enter 新文章',
        error: '错误',
        empty: '列表为空',
        loading: '加载中...',
      },
    };

    const GZ_URL = 'wiki_links.json.gz?v=5';
    const JS_URL = 'wiki_links_data.js?v=5';
    const STORAGE_KEY = 'wiki_seen_v2';
    const HISTORY_KEY = 'wiki_history';
    const HISTORY_INDEX_KEY = 'wiki_history_index';

    try {
      localStorage.removeItem('wiki_seen');
    } catch {}

    const LANG_FLAGS = {
      en:'🇬🇧',ru:'🇷🇺',de:'🇩🇪',fr:'🇫🇷',es:'🇪🇸',it:'🇮🇹',pt:'🇵🇹',
      pl:'🇵🇱',nl:'🇳🇱',sv:'🇸🇪',uk:'🇺🇦',be:'🇧🇾',cs:'🇨🇿',da:'🇩🇰',
      fi:'🇫🇮',el:'🇬🇷',he:'🇮🇱',hu:'🇭🇺',id:'🇮🇩',ja:'🇯🇵',ko:'🇰🇷',
      lt:'🇱🇹',lv:'🇱🇻',nb:'🇳🇴',nn:'🇳🇴',ro:'🇷🇴',sk:'🇸🇰',sl:'🇸🇮',
      sr:'🇷🇸',th:'🇹🇭',vi:'🇻🇳',bg:'🇧🇬',tr:'🇹🇷',ar:'🇸🇦',zh:'🇨🇳',
      hi:'🇮🇳',simple:'🇬🇧',sh:'🇷🇸',et:'🇪🇪',ms:'🇲🇾',tl:'🇵🇭',
    };

    function getFlag(url) {
      try {
        const lang = new URL(url).hostname.split('.')[0];
        return LANG_FLAGS[lang] || '';
      } catch { return ''; }
    }

    function resolveLang(pref) {
      if (pref === 'auto') {
        const browserLang = (navigator.language || '').slice(0, 2);
        return LANGUAGES[browserLang] ? browserLang : 'en';
      }
      return LANGUAGES[pref] ? pref : 'en';
    }

    let langPref = localStorage.getItem(LANG_KEY) || 'auto';
    let lang = resolveLang(langPref);
    let items = [];
    let seen = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    let historyIndex = parseInt(localStorage.getItem(HISTORY_INDEX_KEY) || '-1', 10);

    function saveHistory() {
      try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        localStorage.setItem(HISTORY_INDEX_KEY, String(historyIndex));
      } catch {}
    }

    const titleEl = document.getElementById('title-text');
    const flagEl = document.getElementById('flag');
    const urlEl = document.getElementById('url');
    const errorEl = document.getElementById('error');
    const counterEl = document.getElementById('counter');
    const btnNext = document.getElementById('next');
    const btnPrevFirst = document.getElementById('prev-first');
    const btnPrev = document.getElementById('prev');
    const btnNextNav = document.getElementById('next-nav');
    const btnNextLast = document.getElementById('next-last');
    const announceEl = document.getElementById('announce');
    const langBtn = document.getElementById('lang-btn');
    const langMenu = document.getElementById('lang-menu');

    function saveSeen() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...seen])); } catch {}
    }

    function safeDecode(url) {
      try {
        const u = new URL(url);
        return u.origin + decodeURIComponent(u.pathname) + decodeURIComponent(u.search) + u.hash;
      } catch { return url; }
    }

    function setLang(pref) {
      langPref = pref;
      lang = resolveLang(pref);
      try { localStorage.setItem(LANG_KEY, pref); } catch {}
      applyLang();
      langMenu.querySelectorAll('button').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === pref);
      });
    }

    function applyLang() {
      const t = LANGUAGES[lang];
      if (!t) return;
      document.documentElement.lang = lang;
      document.title = t.title;
      document.getElementById('skip-text').textContent = t.skip;
      document.getElementById('heading-text').textContent = t.heading;
      if (!items.length) titleEl.textContent = t.loading;
      btnPrevFirst.title = t.prevFirst;
      btnPrevFirst.setAttribute('aria-label', t.prevFirst);
      btnPrev.title = t.prev;
      btnPrev.setAttribute('aria-label', t.prev);
      btnNextNav.title = t.nextNav;
      btnNextNav.setAttribute('aria-label', t.nextNav);
      btnNextLast.title = t.nextLast;
      btnNextLast.setAttribute('aria-label', t.nextLast);
      btnNext.textContent = t.nextBtn;
      btnNext.setAttribute('aria-label', t.nextBtnAria);
      document.getElementById('footer-text').textContent = t.footer;
      document.getElementById('footer-link').textContent = t.footerLink;
      document.getElementById('keys-text').textContent = t.keys;
      if (history.length > 0 && historyIndex >= 0 && history[historyIndex] < items.length) {
        document.title = items[history[historyIndex]].title + ' \u2014 ' + t.title;
      }
    }

    function toggleMenu() {
      langMenu.classList.toggle('open');
    }

    function closeMenu() {
      langMenu.classList.remove('open');
    }

    async function loadGzipped(url) {
      const res = await fetch(url, { cache: 'force-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const ds = new DecompressionStream('gzip');
      const decompressed = res.body.pipeThrough(ds);
      return new Response(decompressed).text();
    }

    function loadViaScript(url) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = url;
        s.onload = () => {
          if (window.WIKI_LINKS) {
            resolve(JSON.stringify(window.WIKI_LINKS));
            delete window.WIKI_LINKS;
          } else { reject(new Error('No data')); }
        };
        s.onerror = () => reject(new Error('Script load failed'));
        document.head.appendChild(s);
      });
    }

    async function loadItems() {
      try {
        const text = await loadGzipped(GZ_URL);
        return JSON.parse(text);
      } catch {
        const text = await loadViaScript(JS_URL);
        return JSON.parse(text);
      }
    }

    function pickItem() {
      const unseen = items.filter((_, i) => !seen.has(i));
      if (!unseen.length) {
        seen.clear();
        return items[Math.floor(Math.random() * items.length)];
      }
      return unseen[Math.floor(Math.random() * unseen.length)];
    }

    function showItem(item, nav) {
      const t = LANGUAGES[lang];
      titleEl.textContent = item.title;
      flagEl.textContent = getFlag(item.url);
      urlEl.href = item.url;
      urlEl.textContent = safeDecode(item.url);
      document.title = item.title + ' \u2014 ' + t.title;
      if (announceEl) announceEl.textContent = item.title;
      document.querySelector('.wrap').scrollTop = 0;
      seen = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
      counterEl.textContent = nav
        ? (historyIndex + 1) + ' / ' + history.length
        : seen.size + ' / ' + items.length;
      btnPrevFirst.disabled = historyIndex <= 0;
      btnPrev.disabled = historyIndex <= 0;
      btnNextNav.disabled = historyIndex >= history.length - 1;
      btnNextLast.disabled = historyIndex >= history.length - 1;
    }

    async function load() {
      const t = LANGUAGES[lang];
      errorEl.textContent = '';
      btnNext.disabled = true;

      try {
        if (!items.length) { items = await loadItems(); }
        if (!items.length) throw new Error(t.empty);

        if (historyIndex < history.length - 1) {
          history = history.slice(0, historyIndex + 1);
        }

        const item = pickItem();
        const idx = items.indexOf(item);
        seen.add(idx);
        saveSeen();

        historyIndex++;
        history[historyIndex] = idx;
        history.length = historyIndex + 1;
        saveHistory();

        showItem(item);
      } catch (e) {
        errorEl.textContent = t.error + ': ' + e.message;
        titleEl.textContent = '\u2014';
        flagEl.textContent = '';
        urlEl.href = '#';
        urlEl.textContent = '';
        counterEl.textContent = '';
        document.title = t.error + ' \u2014 ' + t.title;
        if (announceEl) announceEl.textContent = t.error + ': ' + e.message;
      } finally {
        btnNext.disabled = false;
      }
    }

    function goFirst() {
      if (historyIndex <= 0) return;
      historyIndex = 0;
      showItem(items[history[historyIndex]], true);
      saveHistory();
    }

    function goPrev() {
      if (historyIndex <= 0) return;
      historyIndex--;
      showItem(items[history[historyIndex]], true);
      saveHistory();
    }

    function goNextNav() {
      if (historyIndex >= history.length - 1) return;
      historyIndex++;
      showItem(items[history[historyIndex]], true);
      saveHistory();
    }

    function goLast() {
      if (historyIndex >= history.length - 1) return;
      historyIndex = history.length - 1;
      showItem(items[history[historyIndex]], true);
      saveHistory();
    }

    btnPrevFirst.addEventListener('click', goFirst);
    btnPrev.addEventListener('click', goPrev);
    btnNextNav.addEventListener('click', goNextNav);
    btnNextLast.addEventListener('click', goLast);
    btnNext.addEventListener('click', load);

    langBtn.addEventListener('click', e => {
      e.stopPropagation();
      toggleMenu();
    });
    langBtn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleMenu();
      }
    });

    langMenu.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      setLang(btn.dataset.lang);
      closeMenu();
    });

    document.addEventListener('click', e => {
      if (!langMenu.contains(e.target) && e.target !== langBtn) {
        closeMenu();
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      setLang(langPref);

      try {
        if (!items.length) items = await loadItems();
        if (!items.length) throw new Error(LANGUAGES[lang].empty);

        if (history.length > 0 && historyIndex >= 0 && historyIndex < history.length && history[historyIndex] < items.length) {
          showItem(items[history[historyIndex]], true);
        } else {
          history = [];
          historyIndex = -1;
          saveHistory();
          await load();
        }
      } catch (e) {
        const t = LANGUAGES[lang];
        errorEl.textContent = t.error + ': ' + e.message;
        titleEl.textContent = '\u2014';
        flagEl.textContent = '';
        urlEl.href = '#';
        urlEl.textContent = '';
        counterEl.textContent = '';
        document.title = t.error + ' \u2014 ' + t.title;
        if (announceEl) announceEl.textContent = t.error + ': ' + e.message;
      } finally {
        btnNext.disabled = false;
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); goNextNav(); }
      else if (e.key === 'Home') { e.preventDefault(); goFirst(); }
      else if (e.key === 'End') { e.preventDefault(); goLast(); }
      else if (e.key === ' ' || e.key === 'Enter') {
        if (e.target === urlEl) return;
        e.preventDefault(); load();
      }
      else if (e.key === 'Escape') { closeMenu(); }
    });
  </script>
</body>
</html>
